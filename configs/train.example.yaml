model_name_or_path: google/gemma-3-4b-pt
dataset_path: /path/to/hf_dataset
output_dir: outputs/cast_s2s
checkpoint_dir: checkpoints/cast_s2s
hub_repo_id:

wavtokenizer_repo_path: /path/to/WavTokenizer
wavtokenizer_config: /path/to/WavTokenizer/configs/wavtokenizer_smalldata_frame40_3s_nq1_code4096_dim512_kmeans200_attn.yaml
wavtokenizer_checkpoint: /path/to/WavTokenizer/checkpoints/WavTokenizer-large-unify-40token/wavtokenizer_large_unify_600_24k.ckpt

asr_model_name_or_path: openai/whisper-large-v3
audio_sampling_rate: 16000
speech_token_count: 4096
max_length: 4096

train_test_split: 0.05
seed: 42
num_train_epochs: 1
per_device_train_batch_size: 1
gradient_accumulation_steps: 4
learning_rate: 0.0001
weight_decay: 0.01
logging_steps: 10
save_steps: 1000
eval_steps: 1000
save_total_limit: 2
bf16: true

use_lora: true
lora_r: 128
lora_alpha: 256
lora_dropout: 0.01
train_embeddings: false
train_lm_head: false
